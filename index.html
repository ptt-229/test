<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคลังข้อสอบ - สกร.อำเภอพุทธมณฑล</title>
    
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลดฟอนต์ K2D -->
    <link href="https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- โหลด React, ReactDOM และ Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'K2D', sans-serif; 
            background-color: #f8fafc; 
        }
        .quiz-option:hover {
            border-color: #2563eb;
            background-color: #eff6ff;
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        .spin-anim {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media print {
            .print-hidden { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // URL จาก Google Apps Script (ตรวจสอบให้ตรงกับการ Deploy ล่าสุด)
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMBgb7QIrRXZSPzQinL0ECuSshUQC-L65BWrni5IXmGXtYJ447SQs1e5PItmnnzTiB/exec';

        const SUBJECTS = [
            "ภาษาไทย", "ภาษาต่างประเทศ", "คณิตศาสตร์", "วิทยาศาสตร์",
            "เทคโนโลยีดิจิทัล", "การงานอาชีพ", "สุขภาวะและศิลปะ", 
            "สังคมศึกษา ประวัติศาสตร์ และหน้าที่พลเมือง"
        ];

        const LEVELS = ["ประถมศึกษา", "มัธยมศึกษาตอนต้น", "มัธยมศึกษาตอนปลาย"];
        const SKR_LOCATIONS = ["คลองโยง", "มหาสวัสดิ์", "ศาลายา"];
        const YEAR_OPTIONS = ["2568", "2569", "2570", "2571", "อื่น ๆ (ระบุ)"];

        function App() {
            const [isLoadingData, setIsLoadingData] = useState(false);
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [userRole, setUserRole] = useState(null); 
            const [passwordInput, setPasswordInput] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [questions, setQuestions] = useState([]);
            const [currentView, setCurrentView] = useState('login'); 
            
            // สถานะฝั่งนักเรียน
            const [studentInfo, setStudentInfo] = useState({ name: '', level: '', skr: '' });
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [availableQuestionsForSubject, setAvailableQuestionsForSubject] = useState([]);
            const [selectedSubjectName, setSelectedSubjectName] = useState('');
            const [selectedSetName, setSelectedSetName] = useState('');
            const [saveStatus, setSaveStatus] = useState('idle'); 

            // สถานะฝั่งครู
            const [filterSubject, setFilterSubject] = useState('ทั้งหมด');
            const [filterLevel, setFilterLevel] = useState('ทั้งหมด');
            const [isSaving, setIsSaving] = useState(false);
            const [editMode, setEditMode] = useState(false);
            const [oldData, setOldData] = useState({ question: '', level: '', subject: '' });
            const [newQuestion, setNewQuestion] = useState({
                semester: '1', academicYear: '2569', level: LEVELS[0], subject: SUBJECTS[0], question: '', choices: ['', '', '', ''], correctAnswer: 0
            });
            const [customYear, setCustomYear] = useState('');

            useEffect(() => {
                fetchQuestionsFromSheets();
            }, []);

            const fetchQuestionsFromSheets = async (isManual = false) => {
                if (isManual) setIsRefreshing(true);
                else setIsLoadingData(true);
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL);
                    const result = await response.json();
                    if (result.status === 'success') {
                        setQuestions(result.data);
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                } finally {
                    setIsLoadingData(false);
                    setIsRefreshing(false);
                }
            };

            const handleTeacherLogin = (e) => {
                e.preventDefault();
                if (passwordInput === 'admin123') {
                    setUserRole('teacher');
                    setPasswordInput('');
                    setCurrentView('menu');
                } else {
                    alert('รหัสผ่านไม่ถูกต้อง');
                    setPasswordInput('');
                }
            };

            const handleLogout = () => {
                if(window.confirm('ต้องการออกจากระบบใช่หรือไม่?')) {
                    setUserRole(null); 
                    setCurrentView('login');
                    setStudentInfo({ name: '', level: '', skr: '' });
                    setSaveStatus('idle');
                }
            };

            const sendResultToSheets = async (finalScore, totalQuestions, subjectName) => {
                setSaveStatus('saving');
                const payload = {
                    type: 'result',
                    timestamp: new Date().toLocaleString('th-TH'),
                    name: studentInfo.name,
                    level: studentInfo.level,
                    skr: studentInfo.skr,
                    subject: subjectName + " (" + selectedSetName + ")",
                    score: finalScore,
                    total: totalQuestions,
                    percentage: Math.round((finalScore / totalQuestions) * 100)
                };

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const res = await response.json();
                    setSaveStatus(res.status === 'success' ? 'success' : 'error');
                } catch (error) {
                    setSaveStatus('error');
                }
            };

            const handleDeleteQuestion = async (q) => {
                if (!window.confirm(`ยืนยันการลบข้อสอบ: "${q.question}"?`)) return;
                setIsSaving(true);
                try {
                    const res = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ type: 'delete_question', question: q.question, subject: q.subject, level: q.level })
                    });
                    const result = await res.json();
                    if (result.status === 'success') {
                        alert('ลบข้อมูลเรียบร้อยแล้ว');
                        fetchQuestionsFromSheets(true);
                    }
                } catch (e) { alert('ลบไม่สำเร็จ'); }
                finally { setIsSaving(false); }
            };

            const handleFormSubmit = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const finalYear = newQuestion.academicYear === 'อื่น ๆ (ระบุ)' ? customYear : newQuestion.academicYear;
                
                try {
                    const payload = {
                        type: editMode ? 'edit_question' : 'question',
                        oldQuestion: oldData.question,
                        oldLevel: oldData.level,
                        oldSubject: oldData.subject,
                        timestamp: new Date().toLocaleString('th-TH'),
                        ...newQuestion,
                        academicYear: finalYear,
                        choice1: newQuestion.choices[0], choice2: newQuestion.choices[1],
                        choice3: newQuestion.choices[2], choice4: newQuestion.choices[3]
                    };
                    const res = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();
                    if(result.status === 'success') {
                        alert(editMode ? 'อัปเดตข้อมูลสำเร็จ' : 'เพิ่มสำเร็จ');
                        setEditMode(false);
                        fetchQuestionsFromSheets(true);
                        setCurrentView('manage');
                    }
                } catch (error) {
                    alert('เกิดข้อผิดพลาดในการบันทึก');
                } finally {
                    setIsSaving(false);
                }
            };

            // Logic เลือกวิชาและชุด
            const handleSelectSubject = (subject) => {
                const filtered = questions.filter(q => q.subject === subject && q.level === studentInfo.level);
                if (filtered.length === 0) {
                    alert("ไม่พบข้อสอบในระดับนี้");
                    return;
                }
                setAvailableQuestionsForSubject(filtered);
                setSelectedSubjectName(subject);
                setCurrentView('select-set');
            };

            const handleSelectSet = (startIndex, setNum) => {
                const setQuestions = availableQuestionsForSubject.slice(startIndex, startIndex + 5);
                setQuizQuestions(setQuestions);
                setSelectedSetName(`ชุดที่ ${setNum}`);
                setCurrentQuestionIndex(0);
                setScore(0);
                setUserAnswers([]);
                setSaveStatus('idle');
                setCurrentView('quiz');
            };

            const handleAnswerSelect = (index) => {
                const isCorrect = index === quizQuestions[currentQuestionIndex].correctAnswer;
                const newScore = isCorrect ? score + 1 : score;
                if (isCorrect) setScore(newScore);
                setUserAnswers([...userAnswers, { selected: index, isCorrect }]);
                if (currentQuestionIndex + 1 < quizQuestions.length) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                } else {
                    setCurrentView('result');
                    sendResultToSheets(newScore, quizQuestions.length, selectedSubjectName);
                }
            };

            // --- UI Renders ---

            if (isLoadingData && currentView === 'login') return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-blue-50">
                    <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-blue-600 font-bold">กำลังโหลดคลังข้อสอบ...</p>
                </div>
            );

            if (currentView === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50">
                    <div className="max-w-4xl w-full grid md:grid-cols-2 gap-8 animate-fade-in">
                        <div className="bg-white rounded-3xl shadow-2xl p-10 text-center border-t-8 border-blue-600 transition hover:shadow-blue-300">
                            <div className="text-7xl mb-6 text-blue-600">👨‍🎓</div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-8">สำหรับผู้เรียน</h2>
                            <button onClick={() => { setUserRole('student'); setCurrentView('student-info'); }} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">เข้าสู่ระบบผู้เรียน</button>
                        </div>
                        <div className="bg-white rounded-3xl shadow-2xl p-10 text-center border-t-8 border-orange-500 transition hover:shadow-orange-300">
                            <div className="text-7xl mb-6 text-orange-600">🔐</div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-2">สำหรับครู</h2>
                            <form onSubmit={handleTeacherLogin} className="space-y-4">
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} placeholder="รหัสผ่านผู้ดูแล" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full border-2 border-gray-100 bg-gray-50 rounded-2xl py-4 px-6 text-center outline-none focus:border-orange-400" required />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-4 text-gray-400 text-xl">{showPassword ? '👁️' : '🙈'}</button>
                                </div>
                                <button type="submit" className="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg">เข้าสู่ระบบครู</button>
                            </form>
                        </div>
                    </div>
                </div>
            );

            if (currentView === 'student-info') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-blue-50">
                    <form onSubmit={(e) => { e.preventDefault(); setCurrentView('select-subject'); }} className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 border-t-8 border-blue-600 space-y-6 animate-fade-in">
                        <h2 className="text-2xl font-bold text-center">ระบุข้อมูลผู้เข้าสอบ</h2>
                        <div className="space-y-4">
                            <input type="text" placeholder="ชื่อ-นามสกุล" value={studentInfo.name} onChange={(e)=>setStudentInfo({...studentInfo, name: e.target.value})} className="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none" required />
                            <select value={studentInfo.level} onChange={(e)=>setStudentInfo({...studentInfo, level: e.target.value})} className="w-full border-2 border-gray-100 p-4 rounded-2xl bg-white font-bold text-blue-700" required>
                                <option value="">-- เลือกระดับชั้น --</option>{LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
                            </select>
                            <select value={studentInfo.skr} onChange={(e)=>setStudentInfo({...studentInfo, skr: e.target.value})} className="w-full border-2 border-gray-100 p-4 rounded-2xl bg-white" required>
                                <option value="">-- เลือก ศกร. --</option>{SKR_LOCATIONS.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg">ถัดไป: เลือกรายวิชา</button>
                        <button type="button" onClick={() => setCurrentView('login')} className="w-full text-gray-400 text-sm">ย้อนกลับ</button>
                    </form>
                </div>
            );

            if (currentView === 'select-subject') return (
                <div className="min-h-screen p-8 bg-gray-50 max-w-6xl mx-auto">
                    <div className="flex flex-col sm:flex-row justify-between items-center mb-10 gap-4">
                        <div><h1 className="text-3xl font-bold text-gray-800">เลือกวิชาทำแบบทดสอบ</h1><p className="text-blue-600 font-bold">ระดับ: {studentInfo.level}</p></div>
                        <div className="flex gap-2">
                            <button onClick={() => fetchQuestionsFromSheets(true)} className="bg-white px-4 py-2 rounded-xl border flex items-center gap-2 font-bold text-gray-600 shadow-sm"><span className={isRefreshing ? 'spin-anim':''}>🔄</span> {isRefreshing ? 'กำลังอัปเดต...' : 'รีเฟรช'}</button>
                            <button onClick={handleLogout} className="bg-white px-4 py-2 rounded-xl border text-red-500 font-bold hover:bg-red-50">ออกจากระบบ</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        {SUBJECTS.map((s, i) => {
                            const count = questions.filter(q => q.subject === s && q.level === studentInfo.level).length;
                            return (
                                <button key={i} onClick={() => handleSelectSubject(s)} disabled={count === 0} className={`p-8 rounded-3xl border-2 text-left h-full transition-all group ${count > 0 ? 'bg-white border-blue-100 hover:border-blue-500 hover:shadow-xl' : 'bg-gray-100 opacity-50 cursor-not-allowed'}`}>
                                    <h3 className="font-bold text-xl mb-2 leading-tight">{s}</h3><div className="text-xs font-bold text-blue-500">{count > 0 ? `พบข้อสอบ ${count} ข้อ` : 'ไม่มีข้อสอบ'}</div>
                                </button>
                            );
                        })}
                    </div>
                </div>
            );

            if (currentView === 'select-set') return (
                <div className="min-h-screen p-8 flex flex-col items-center justify-center bg-blue-50 text-center animate-fade-in">
                    <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-10">
                        <h2 className="text-2xl font-bold mb-8 underline underline-offset-8 decoration-blue-500">{selectedSubjectName}</h2>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {Array.from({ length: Math.ceil(availableQuestionsForSubject.length / 5) }).map((_, idx) => (
                                <button key={idx} onClick={() => handleSelectSet(idx * 5, idx + 1)} className="p-6 border-2 border-blue-100 rounded-2xl bg-blue-50 text-blue-700 font-bold transition-all hover:bg-blue-600 hover:text-white transform hover:scale-105">ชุดที่ {idx + 1}<br/><span className="text-xs font-normal">ข้อ {idx * 5 + 1} - {Math.min((idx + 1) * 5, availableQuestionsForSubject.length)}</span></button>
                            ))}
                        </div>
                        <button onClick={() => setCurrentView('select-subject')} className="mt-8 text-gray-400 font-bold">ย้อนกลับ</button>
                    </div>
                </div>
            );

            if (currentView === 'quiz') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-indigo-50 animate-fade-in">
                    <div className="max-w-3xl w-full bg-white rounded-[2.5rem] shadow-2xl p-10 md:p-16 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gray-100"><div className="bg-blue-600 h-full transition-all duration-500" style={{width: `${((currentQuestionIndex)/quizQuestions.length)*100}%`}}></div></div>
                        <div className="flex justify-between mb-8 text-xs font-bold text-gray-400 uppercase"><span>{selectedSubjectName} | {selectedSetName}</span><span>{currentQuestionIndex + 1}/{quizQuestions.length}</span></div>
                        <h2 className="text-2xl md:text-3xl font-bold text-gray-800 mb-12">{quizQuestions[currentQuestionIndex].question}</h2>
                        <div className="grid gap-4">
                            {quizQuestions[currentQuestionIndex].choices.map((c, i) => (
                                <button key={i} onClick={() => handleAnswerSelect(i)} className="quiz-option w-full text-left p-6 rounded-2xl border-2 border-gray-50 bg-gray-50 transition-all font-bold text-lg flex items-center group"><span className="w-10 h-10 rounded-full bg-white border-2 border-gray-200 text-center leading-9 mr-4 text-sm text-gray-400 group-hover:border-blue-500 group-hover:text-blue-500 group-active:scale-95">{['ก','ข','ค','ง'][i]}</span>{c}</button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (currentView === 'result') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-blue-700 text-center animate-fade-in relative">
                    <div className="max-w-xl w-full bg-white rounded-[3rem] p-12 shadow-2xl">
                        <h2 className="text-3xl font-black mb-8 uppercase tracking-widest text-blue-700">RESULT</h2>
                        <div className="bg-blue-50 p-8 rounded-[2rem] mb-10 border-2 border-blue-100 text-blue-900 font-bold">{studentInfo.name}<br/>{studentInfo.level}<br/>{selectedSubjectName} ({selectedSetName})</div>
                        <div className="w-44 h-44 mx-auto rounded-full border-[15px] border-blue-600 flex flex-col items-center justify-center mb-8 bg-white"><span className="text-6xl font-black text-blue-600">{score}</span><span className="text-gray-400 font-bold">/ {quizQuestions.length}</span></div>
                        <div className="mb-8">{saveStatus === 'saving' && <div className="text-orange-500 font-bold italic animate-pulse">⏳ กำลังส่งคะแนน...</div>}{saveStatus === 'success' && <div className="text-green-600 font-bold">✅ บันทึกสำเร็จ!</div>}</div>
                        <button onClick={()=>setCurrentView('select-subject')} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200">ทำวิชาอื่นต่อ</button>
                    </div>
                </div>
            );

            // --- ส่วนของคุณครู ---
            if (currentView === 'menu') return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50 p-4 text-center animate-fade-in">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 border-t-8 border-orange-500 space-y-4">
                        <h1 className="text-2xl font-bold text-gray-700 uppercase">จัดการระบบ (ครู)</h1>
                        <button onClick={() => { setEditMode(false); setCustomYear(''); setCurrentView('add'); }} className="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold shadow-md">+ เพิ่มข้อสอบใหม่</button>
                        <button onClick={() => setCurrentView('manage')} className="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-md">📋 จัดการคลังข้อสอบ ({questions.length})</button>
                        <button onClick={handleLogout} className="w-full border-2 py-4 rounded-2xl font-bold text-gray-400 hover:text-red-500 transition-all">ออกจากระบบ</button>
                    </div>
                </div>
            );

            if (currentView === 'manage') {
                const filtered = questions.filter(q => (filterSubject === 'ทั้งหมด' || q.subject === filterSubject) && (filterLevel === 'ทั้งหมด' || q.level === filterLevel));
                return (
                    <div className="min-h-screen p-8 bg-white max-w-5xl mx-auto animate-fade-in">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                            <div className="flex items-center gap-4"><button onClick={() => setCurrentView('menu')} className="text-orange-500 font-bold underline">⬅️ กลับเมนู</button><h2 className="text-2xl font-bold text-gray-700">จัดการคลังข้อสอบ</h2></div>
                            <div className="flex gap-2">
                                <button onClick={() => fetchQuestionsFromSheets(true)} className="bg-white px-4 py-2 rounded-xl border flex items-center gap-2 font-bold text-gray-600 shadow-sm"><span className={isRefreshing ? 'spin-anim':''}>🔄</span></button>
                                <button onClick={() => { setEditMode(false); setCustomYear(''); setCurrentView('add'); }} className="bg-emerald-500 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">+ เพิ่ม</button>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-slate-50 p-6 rounded-3xl text-sm">
                            <select value={filterSubject} onChange={(e)=>setFilterSubject(e.target.value)} className="p-4 rounded-2xl outline-none shadow-sm bg-white"><option value="ทั้งหมด">ทุกวิชา</option>{SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}</select>
                            <select value={filterLevel} onChange={(e)=>setFilterLevel(e.target.value)} className="p-4 rounded-2xl outline-none shadow-sm bg-white"><option value="ทั้งหมด">ทุกระดับ</option>{LEVELS.map(l=><option key={l} value={l}>{l}</option>)}</select>
                        </div>
                        <div className="space-y-6">
                            {filtered.map((q, i) => (
                                <div key={i} className="border-2 border-gray-100 p-8 rounded-[2.5rem] bg-white relative group hover:border-blue-200 transition-all shadow-sm">
                                    <div className="flex gap-2 mb-4"><span className="bg-blue-100 text-blue-600 text-[10px] px-3 py-1 rounded-full font-bold uppercase">{q.level}</span><span className="bg-orange-100 text-orange-600 text-[10px] px-3 py-1 rounded-full font-bold">{q.subject}</span></div>
                                    <p className="font-bold text-gray-800 text-xl mb-6 pr-10">{q.question}</p>
                                    <div className="flex justify-end gap-3 pt-4 border-t border-gray-50">
                                        <button onClick={() => { 
                                            setEditMode(true); 
                                            setOldData({ question: q.question, level: q.level, subject: q.subject });
                                            setNewQuestion({ semester: q.semester || '1', academicYear: YEAR_OPTIONS.includes(q.academicYear) ? q.academicYear : 'อื่น ๆ (ระบุ)', level: q.level, subject: q.subject, question: q.question, choices: [...q.choices], correctAnswer: q.correctAnswer });
                                            if(!YEAR_OPTIONS.includes(q.academicYear)) setCustomYear(q.academicYear);
                                            setCurrentView('add');
                                        }} className="bg-blue-50 text-blue-600 px-6 py-2 rounded-xl text-sm font-bold hover:bg-blue-600 hover:text-white transition-all">แก้ไข</button>
                                        <button onClick={() => handleDeleteQuestion(q)} className="bg-red-50 text-red-600 px-6 py-2 rounded-xl text-sm font-bold hover:bg-red-600 hover:text-white transition-all">ลบ</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (currentView === 'add') return (
                <div className="min-h-screen p-8 bg-slate-50 flex justify-center items-center animate-fade-in">
                    <form onSubmit={handleFormSubmit} className="max-w-3xl w-full bg-white rounded-[3rem] p-10 md:p-14 shadow-2xl space-y-6 animate-fade-in text-center">
                        <h2 className="text-3xl font-black mb-6 text-orange-500">{editMode ? '🔄 แก้ไขข้อสอบ' : '➕ สร้างข้อสอบใหม่'}</h2>
                        <div className="grid grid-cols-2 gap-4 text-left">
                            <div><label className="text-xs font-bold text-gray-400 ml-1">ภาคเรียน</label><select value={newQuestion.semester} onChange={(e)=>setNewQuestion({...newQuestion, semester: e.target.value})} className="w-full border-2 p-4 rounded-2xl bg-gray-50 font-bold outline-none"><option value="1">1</option><option value="2">2</option></select></div>
                            <div><label className="text-xs font-bold text-gray-400 ml-1">ปีการศึกษา</label><select value={newQuestion.academicYear} onChange={(e)=>setNewQuestion({...newQuestion, academicYear: e.target.value})} className="w-full border-2 p-4 rounded-2xl bg-gray-50 font-bold outline-none">{YEAR_OPTIONS.map(y=><option key={y} value={y}>{y}</option>)}</select></div>
                        </div>
                        {newQuestion.academicYear === 'อื่น ๆ (ระบุ)' && (<div className="animate-fade-in text-left"><input type="text" placeholder="ระบุปี พ.ศ. เช่น 2575" value={customYear} onChange={(e)=>setCustomYear(e.target.value)} className="w-full border-2 border-orange-200 p-4 rounded-2xl outline-none bg-orange-50 font-bold" required /></div>)}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
                            <div><label className="text-xs font-bold text-gray-400 ml-1">ระดับชั้น</label><select value={newQuestion.level} onChange={(e)=>setNewQuestion({...newQuestion, level: e.target.value})} className="w-full border-2 p-4 rounded-2xl bg-gray-50 font-bold outline-none">{LEVELS.map(l=><option key={l} value={l}>{l}</option>)}</select></div>
                            <div><label className="text-xs font-bold text-gray-400 ml-1">วิชา</label><select value={newQuestion.subject} onChange={(e)=>setNewQuestion({...newQuestion, subject: e.target.value})} className="w-full border-2 p-4 rounded-2xl bg-gray-50 font-bold outline-none">{SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                        </div>
                        <div><textarea placeholder="คำถาม..." value={newQuestion.question} onChange={(e)=>setNewQuestion({...newQuestion, question: e.target.value})} className="w-full border-2 p-6 rounded-2xl h-36 bg-gray-50 outline-none focus:border-orange-500 font-bold transition-all" required /></div>
                        <div className="space-y-4 text-left"><label className="text-xs font-bold text-gray-400 ml-1 uppercase">ตัวเลือก (เลือก 1 ข้อที่ถูก)</label>
                            {newQuestion.choices.map((c, i) => (
                                <div key={i} className="flex gap-4 items-center group">
                                    <input type="radio" checked={newQuestion.correctAnswer === i} onChange={()=>setNewQuestion({...newQuestion, correctAnswer: i})} className="w-6 h-6 accent-orange-500 cursor-pointer" />
                                    <input type="text" placeholder={`ตัวเลือกที่ ${i+1}`} value={c} onChange={(e)=>{ let nc = [...newQuestion.choices]; nc[i] = e.target.value; setNewQuestion({...newQuestion, choices: nc}); }} className="flex-1 border-2 border-gray-50 p-4 rounded-2xl bg-gray-50 outline-none focus:border-orange-400 font-medium" required />
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-4 pt-8"><button type="button" onClick={()=>{ setEditMode(false); setCustomYear(''); setCurrentView('manage'); }} className="flex-1 bg-gray-100 py-5 rounded-2xl font-black text-gray-400">ยกเลิก</button><button type="submit" disabled={isSaving} className="flex-[2] bg-orange-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">{isSaving ? '⏳ บันทึก...' : (editMode ? '💾 บันทึกทับแถวเดิม' : '💾 บันทึกใหม่')}</button></div>
                    </form>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

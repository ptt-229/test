<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคลังข้อสอบ - สกร.อำเภอพุทธมณฑล</title>
    
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลดฟอนต์ K2D -->
    <link href="https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- โหลด React และ Babel สำหรับ JSX -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'K2D', sans-serif; 
            background-color: #f8fafc; 
        }
        .quiz-option:hover {
            border-color: #2563eb;
            background-color: #eff6ff;
        }
        @media print {
            .print-hidden { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // URL สำหรับเชื่อมต่อกับ Google Apps Script
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMBgb7QIrRXZSPzQinL0ECuSshUQC-L65BWrni5IXmGXtYJ447SQs1e5PItmnnzTiB/exec';

        const SUBJECTS = [
            "ภาษาไทย", "ภาษาต่างประเทศ", "คณิตศาสตร์", "วิทยาศาสตร์",
            "เทคโนโลยีดิจิทัล", "การงานอาชีพ", "สุขภาวะและศิลปะ", 
            "สังคมศึกษา ประวัติศาสตร์ และหน้าที่พลเมือง"
        ];

        const LEVELS = ["ประถมศึกษา", "มัธยมศึกษาตอนต้น", "มัธยมศึกษาตอนปลาย"];
        const SKR_LOCATIONS = ["คลองโยง", "มหาสวัสดิ์", "ศาลายา"];

        function App() {
            const [isLoadingData, setIsLoadingData] = useState(false);
            const [userRole, setUserRole] = useState(null); 
            const [passwordInput, setPasswordInput] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [questions, setQuestions] = useState([]);
            const [currentView, setCurrentView] = useState('login'); 
            
            // ข้อมูลผู้เข้าสอบ
            const [studentInfo, setStudentInfo] = useState({ name: '', level: '', skr: '' });
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);
            const [quizQuestions, setQuizQuestions] = useState([]);
            
            // สถานะการบันทึกข้อมูล
            const [saveStatus, setSaveStatus] = useState('idle'); // idle, saving, success, error

            // สำหรับคุณครู
            const [filterSubject, setFilterSubject] = useState('ทั้งหมด');
            const [filterLevel, setFilterLevel] = useState('ทั้งหมด');
            const [isSaving, setIsSaving] = useState(false);
            const [newQuestion, setNewQuestion] = useState({
                semester: '1', academicYear: '2569', level: LEVELS[0], subject: SUBJECTS[0], question: '', choices: ['', '', '', ''], correctAnswer: 0
            });

            // ดึงข้อมูลเมื่อเริ่มแอป
            useEffect(() => {
                fetchQuestionsFromSheets();
            }, []);

            const fetchQuestionsFromSheets = async () => {
                setIsLoadingData(true);
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL);
                    const result = await response.json();
                    if (result.status === 'success' && result.data) {
                        setQuestions(result.data);
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                } finally {
                    setIsLoadingData(false);
                }
            };

            const handleTeacherLogin = (e) => {
                e.preventDefault();
                if (passwordInput === 'admin123') {
                    setUserRole('teacher'); setPasswordInput(''); setCurrentView('menu');
                } else {
                    alert('รหัสผ่านไม่ถูกต้อง'); setPasswordInput('');
                }
            };

            const handleLogout = () => {
                if(window.confirm('ต้องการออกจากระบบใช่หรือไม่?')) {
                    setUserRole(null); setCurrentView('login');
                    setStudentInfo({ name: '', level: '', skr: '' });
                    setSaveStatus('idle');
                }
            };

            // ฟังก์ชันส่งผลคะแนนไปบันทึกใน Google Sheets
            const sendResultToSheets = async (finalScore, totalQuestions) => {
                setSaveStatus('saving');
                const payload = {
                    type: 'result',
                    timestamp: new Date().toLocaleString('th-TH'),
                    name: studentInfo.name,
                    level: studentInfo.level,
                    skr: studentInfo.skr,
                    subject: quizQuestions[0]?.subject,
                    score: finalScore,
                    total: totalQuestions,
                    percentage: Math.round((finalScore / totalQuestions) * 100)
                };

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    const res = await response.json();
                    if (res.status === 'success') setSaveStatus('success');
                    else setSaveStatus('error');
                } catch (error) {
                    console.error("Save error:", error);
                    setSaveStatus('error');
                }
            };

            // จัดการเมื่อเลือกคำตอบ
            const handleAnswerSelect = (choiceIndex) => {
                const isCorrect = choiceIndex === quizQuestions[currentQuestionIndex].correctAnswer;
                const newScore = isCorrect ? score + 1 : score;
                if (isCorrect) setScore(newScore);
                
                setUserAnswers([...userAnswers, { selected: choiceIndex, isCorrect }]);
                
                if (currentQuestionIndex + 1 < quizQuestions.length) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                } else {
                    setCurrentView('result');
                    sendResultToSheets(newScore, quizQuestions.length);
                }
            };

            // เริ่มทำข้อสอบ (กรองตามวิชาและระดับชั้น)
            const startQuiz = (subject) => {
                const filtered = questions.filter(q => q.subject === subject && q.level === studentInfo.level);
                if (filtered.length === 0) {
                    alert(`ขออภัย ไม่พบข้อสอบวิชา ${subject} สำหรับระดับ ${studentInfo.level}`);
                    return;
                }
                setQuizQuestions(filtered);
                setCurrentQuestionIndex(0); 
                setScore(0); 
                setUserAnswers([]); 
                setSaveStatus('idle');
                setCurrentView('quiz');
            };

            const handleAddSubmit = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                try {
                    const payload = {
                        type: 'question',
                        timestamp: new Date().toLocaleString('th-TH'),
                        ...newQuestion,
                        choice1: newQuestion.choices[0],
                        choice2: newQuestion.choices[1],
                        choice3: newQuestion.choices[2],
                        choice4: newQuestion.choices[3]
                    };
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    alert('บันทึกข้อสอบใหม่เรียบร้อยแล้ว');
                    setNewQuestion({ ...newQuestion, question: '', choices: ['', '', '', ''] });
                    fetchQuestionsFromSheets();
                    setCurrentView('manage');
                } catch (error) {
                    alert('เกิดข้อผิดพลาดในการบันทึก');
                } finally {
                    setIsSaving(false);
                }
            };

            // --- ส่วนแสดงผลหน้าจอต่างๆ ---

            // 1. หน้า Login
            if (currentView === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-50 to-indigo-100">
                    <div className="max-w-4xl w-full grid md:grid-cols-2 gap-8">
                        <div className="bg-white rounded-3xl shadow-2xl p-10 text-center border-t-8 border-blue-500 transition hover:shadow-blue-200">
                            <div className="text-6xl mb-6">👨‍🎓</div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-2">สำหรับผู้เรียน</h2>
                            <p className="text-gray-500 mb-8">เข้าทำแบบทดสอบและบันทึกคะแนน</p>
                            <button onClick={() => { setUserRole('student'); setCurrentView('student-info'); }} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">เข้าสู่ระบบผู้เรียน</button>
                        </div>
                        <div className="bg-white rounded-3xl shadow-2xl p-10 text-center border-t-8 border-orange-500 transition hover:shadow-orange-200">
                            <div className="text-6xl mb-6">🔐</div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-2">สำหรับครู</h2>
                            <p className="text-gray-500 mb-6">จัดการคลังข้อสอบและดูผลสอบ</p>
                            <form onSubmit={handleTeacherLogin} className="space-y-4">
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} placeholder="รหัสผ่าน" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full border-2 border-gray-100 bg-gray-50 rounded-2xl py-4 px-6 text-center outline-none focus:border-orange-400" required />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-4 text-gray-400 text-xl">
                                        {showPassword ? '👁️' : '🙈'}
                                    </button>
                                </div>
                                <button type="submit" className="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg">เข้าสู่ระบบครู</button>
                            </form>
                        </div>
                    </div>
                </div>
            );

            // 2. หน้ากรอกข้อมูลผู้สอบ
            if (currentView === 'student-info') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-blue-50">
                    <form onSubmit={(e) => { e.preventDefault(); setCurrentView('select-subject'); }} className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 border-t-8 border-blue-600 space-y-6">
                        <div className="text-center">
                            <h2 className="text-2xl font-bold text-gray-800">ข้อมูลผู้เข้าสอบ</h2>
                            <p className="text-gray-500 text-sm mt-1">กรุณาระบุข้อมูลตามจริงเพื่อบันทึกผล</p>
                        </div>
                        <div className="space-y-4">
                            <input type="text" placeholder="ชื่อ-นามสกุล" value={studentInfo.name} onChange={(e)=>setStudentInfo({...studentInfo, name: e.target.value})} className="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-blue-500" required />
                            <select value={studentInfo.level} onChange={(e)=>setStudentInfo({...studentInfo, level: e.target.value})} className="w-full border-2 border-gray-100 p-4 rounded-2xl bg-white focus:border-blue-500" required>
                                <option value="">-- เลือกระดับชั้น --</option>
                                {LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
                            </select>
                            <select value={studentInfo.skr} onChange={(e)=>setStudentInfo({...studentInfo, skr: e.target.value})} className="w-full border-2 border-gray-100 p-4 rounded-2xl bg-white focus:border-blue-500" required>
                                <option value="">-- เลือก ศกร. --</option>
                                {SKR_LOCATIONS.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">ถัดไป: เลือกวิชา</button>
                        <button type="button" onClick={() => setCurrentView('login')} className="w-full text-gray-400 text-sm">ย้อนกลับ</button>
                    </form>
                </div>
            );

            // 3. หน้าเลือกรายวิชา (สัมพันธ์ตามระดับชั้น)
            if (currentView === 'select-subject') return (
                <div className="min-h-screen p-8 bg-gray-50">
                    <div className="max-w-6xl mx-auto">
                        <div className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-800">เลือกวิชาทำแบบทดสอบ</h1>
                                <p className="text-blue-600 font-bold">ระดับ: {studentInfo.level}</p>
                            </div>
                            <button onClick={handleLogout} className="bg-white px-6 py-2 rounded-xl border text-red-500 font-bold hover:bg-red-50">ออกจากระบบ</button>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            {SUBJECTS.map((s, i) => {
                                const count = questions.filter(q => q.subject === s && q.level === studentInfo.level).length;
                                return (
                                    <button key={i} onClick={() => startQuiz(s)} disabled={count === 0} className={`p-8 rounded-3xl border-2 text-left h-full transition-all group ${count > 0 ? 'bg-white border-blue-100 hover:border-blue-500 hover:shadow-xl' : 'bg-gray-100 opacity-50 cursor-not-allowed'}`}>
                                        <h3 className="font-bold text-xl text-gray-800 mb-2">{s}</h3>
                                        <div className="text-xs font-bold text-blue-500">{count > 0 ? `พบข้อสอบ ${count} ข้อ` : 'ไม่มีข้อสอบในระดับนี้'}</div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );

            // 4. หน้าทำข้อสอบ
            if (currentView === 'quiz') {
                const q = quizQuestions[currentQuestionIndex];
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-indigo-50">
                        <div className="max-w-3xl w-full bg-white rounded-[2.5rem] shadow-2xl p-10 md:p-16 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gray-100">
                                <div className="bg-blue-600 h-full transition-all duration-500" style={{width: `${((currentQuestionIndex)/quizQuestions.length)*100}%`}}></div>
                            </div>
                            <div className="flex justify-between mb-8 text-sm font-bold text-gray-400 uppercase tracking-widest">
                                <span>{q.subject}</span>
                                <span>ข้อที่ {currentQuestionIndex + 1} / {quizQuestions.length}</span>
                            </div>
                            <h2 className="text-2xl md:text-3xl font-bold text-gray-800 mb-12 leading-relaxed">{q.question}</h2>
                            <div className="grid gap-4">
                                {q.choices.map((c, i) => (
                                    <button key={i} onClick={() => handleAnswerSelect(i)} className="quiz-option w-full text-left p-6 rounded-2xl border-2 border-gray-50 bg-gray-50 transition-all font-bold text-lg text-gray-700 flex items-center">
                                        <span className="w-10 h-10 rounded-full bg-white border-2 border-gray-200 text-center leading-9 mr-4 text-sm text-gray-400 group-hover:border-blue-500">{['ก','ข','ค','ง'][i]}</span>
                                        {c}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // 5. หน้าสรุปผลคะแนน
            if (currentView === 'result') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-blue-600 to-indigo-800">
                    <div className="max-w-xl w-full bg-white rounded-[3rem] shadow-2xl p-12 text-center">
                        <h2 className="text-4xl font-black text-gray-800 mb-8 tracking-widest">RESULT</h2>
                        <div className="bg-blue-50 p-8 rounded-[2rem] mb-10 border-2 border-blue-100">
                            <p className="text-2xl font-bold text-blue-900">{studentInfo.name}</p>
                            <p className="text-blue-600 font-bold text-sm">{studentInfo.level} | {studentInfo.skr}</p>
                            <div className="h-px bg-blue-200 my-4"></div>
                            <p className="text-lg font-bold text-gray-800 underline underline-offset-8">{quizQuestions[0]?.subject}</p>
                        </div>
                        <div className="w-44 h-44 mx-auto rounded-full border-[14px] border-blue-600 flex flex-col items-center justify-center mb-8 bg-white shadow-inner">
                            <span className="text-6xl font-black text-blue-600">{score}</span>
                            <span className="text-gray-400 font-bold">/ {quizQuestions.length}</span>
                        </div>
                        
                        {/* แจ้งเตือนการบันทึกข้อมูล */}
                        <div className="mb-8 py-2">
                            {saveStatus === 'saving' && <div className="text-orange-500 font-bold animate-pulse">⏳ กำลังบันทึกคะแนนลงฐานข้อมูล...</div>}
                            {saveStatus === 'success' && <div className="text-green-600 font-bold">✅ บันทึกคะแนนลง Google Sheets สำเร็จ!</div>}
                            {saveStatus === 'error' && <div className="text-red-500 font-bold">❌ เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาแจ้งครู</div>}
                        </div>

                        <button onClick={()=>setCurrentView('select-subject')} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-black text-xl shadow-xl transition-all active:scale-95">ทำวิชาอื่นต่อ</button>
                        <button onClick={handleLogout} className="mt-6 text-gray-400 font-bold hover:text-red-400 transition-colors">ออกจากระบบ</button>
                    </div>
                </div>
            );

            // เมนูสำหรับคุณครู
            if (currentView === 'menu') return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 text-center border-t-8 border-orange-500 space-y-4">
                        <h1 className="text-2xl font-bold mb-6 text-gray-700">เมนูการจัดการสำหรับครู</h1>
                        <button onClick={() => setCurrentView('manage')} className="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg">📋 จัดการคลังข้อสอบ ({questions.length} ข้อ)</button>
                        <button onClick={handleLogout} className="w-full border-2 border-gray-100 py-4 rounded-2xl font-bold text-gray-400">ออกจากระบบ</button>
                    </div>
                </div>
            );

            if (currentView === 'manage') return (
                <div className="p-8 max-w-5xl mx-auto bg-white min-h-screen">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={() => setCurrentView('menu')} className="font-bold text-orange-500">⬅️ กลับเมนู</button>
                        <h2 className="text-2xl font-bold">คลังข้อสอบทั้งหมด</h2>
                        <button onClick={() => setCurrentView('add')} className="bg-orange-500 text-white px-6 py-2 rounded-xl font-bold">+ เพิ่มข้อสอบ</button>
                    </div>
                    <div className="grid grid-cols-2 gap-4 mb-8 bg-gray-50 p-4 rounded-2xl">
                        <select value={filterSubject} onChange={(e)=>setFilterSubject(e.target.value)} className="p-3 rounded-xl outline-none shadow-sm"><option value="ทั้งหมด">ทุกวิชา</option>{SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}</select>
                        <select value={filterLevel} onChange={(e)=>setFilterLevel(e.target.value)} className="p-3 rounded-xl outline-none shadow-sm"><option value="ทั้งหมด">ทุกระดับ</option>{LEVELS.map(l=><option key={l} value={l}>{l}</option>)}</select>
                    </div>
                    <div className="space-y-4">
                        {questions.filter(q => (filterSubject==='ทั้งหมด'||q.subject===filterSubject) && (filterLevel==='ทั้งหมด'||q.level===filterLevel)).map((q, i) => (
                            <div key={i} className="border-2 border-gray-50 p-6 rounded-2xl">
                                <div className="flex gap-2 mb-3">
                                    <span className="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded font-bold uppercase">{q.level}</span>
                                    <span className="bg-orange-100 text-orange-600 text-[10px] px-2 py-0.5 rounded font-bold">{q.subject}</span>
                                </div>
                                <p className="font-bold text-gray-800">{q.question}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (currentView === 'add') return (
                <div className="min-h-screen p-8 bg-gray-50 flex justify-center">
                    <form onSubmit={handleAddSubmit} className="max-w-2xl w-full bg-white rounded-3xl p-10 shadow-xl space-y-6">
                        <h2 className="text-2xl font-bold text-center mb-4">สร้างข้อสอบใหม่</h2>
                        <div className="grid grid-cols-2 gap-4">
                            <select value={newQuestion.level} onChange={(e)=>setNewQuestion({...newQuestion, level: e.target.value})} className="border p-4 rounded-2xl bg-gray-50">{LEVELS.map(l=><option key={l} value={l}>{l}</option>)}</select>
                            <select value={newQuestion.subject} onChange={(e)=>setNewQuestion({...newQuestion, subject: e.target.value})} className="border p-4 rounded-2xl bg-gray-50">{SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}</select>
                        </div>
                        <textarea placeholder="โจทย์คำถาม" value={newQuestion.question} onChange={(e)=>setNewQuestion({...newQuestion, question: e.target.value})} className="w-full border p-6 rounded-2xl h-32 bg-gray-50 outline-none focus:border-orange-400" required />
                        {newQuestion.choices.map((c, i) => (
                            <div key={i} className="flex gap-3 items-center">
                                <input type="radio" checked={newQuestion.correctAnswer === i} onChange={()=>setNewQuestion({...newQuestion, correctAnswer: i})} className="w-5 h-5 accent-orange-500" />
                                <input type="text" placeholder={`ตัวเลือกที่ ${i+1}`} value={c} onChange={(e)=>{
                                    const nc = [...newQuestion.choices]; nc[i] = e.target.value;
                                    setNewQuestion({...newQuestion, choices: nc});
                                }} className="flex-1 border p-4 rounded-2xl bg-gray-50 outline-none focus:border-orange-400" required />
                            </div>
                        ))}
                        <div className="flex gap-4 pt-6">
                            <button type="button" onClick={()=>setCurrentView('manage')} className="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">ยกเลิก</button>
                            <button type="submit" disabled={isSaving} className="flex-[2] bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg transition-all">{isSaving ? 'กำลังบันทึก...' : 'บันทึกลงฐานข้อมูล'}</button>
                        </div>
                    </form>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

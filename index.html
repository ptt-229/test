<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคลังข้อสอบ - สกร.อำเภอพุทธมณฑล</title>
    
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลดฟอนต์ K2D -->
    <link href="https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- โหลด React และ Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'K2D', sans-serif; 
            background-color: #f8fafc; 
        }
        .quiz-option:hover {
            border-color: #2563eb;
            background-color: #eff6ff;
        }
        /* ซ่อนส่วนที่ไม่ต้องการตอนพิมพ์ */
        @media print {
            .print-hidden { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // URL สำหรับเชื่อมต่อกับ Google Apps Script (ตรวจสอบให้ตรงกับที่ Deploy ล่าสุด)
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMBgb7QIrRXZSPzQinL0ECuSshUQC-L65BWrni5IXmGXtYJ447SQs1e5PItmnnzTiB/exec';

        const SUBJECTS = [
            "ภาษาไทย", "ภาษาต่างประเทศ", "คณิตศาสตร์", "วิทยาศาสตร์",
            "เทคโนโลยีดิจิทัล", "การงานอาชีพ", "สุขภาวะและศิลปะ", 
            "สังคมศึกษา ประวัติศาสตร์ และหน้าที่พลเมือง"
        ];

        const LEVELS = ["ประถมศึกษา", "มัธยมศึกษาตอนต้น", "มัธยมศึกษาตอนปลาย"];
        const SKR_LOCATIONS = ["คลองโยง", "มหาสวัสดิ์", "ศาลายา"];

        function App() {
            const [isLoadingData, setIsLoadingData] = useState(false);
            const [userRole, setUserRole] = useState(null); 
            const [passwordInput, setPasswordInput] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [questions, setQuestions] = useState([]);
            const [currentView, setCurrentView] = useState('login'); 
            
            // สถานะฝั่งผู้เรียน
            const [studentInfo, setStudentInfo] = useState({ name: '', level: '', skr: '' });
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [saveStatus, setSaveStatus] = useState('idle'); // idle, saving, success, error

            // สถานะฝั่งคุณครู
            const [filterSubject, setFilterSubject] = useState('ทั้งหมด');
            const [filterLevel, setFilterLevel] = useState('ทั้งหมด');
            const [isSaving, setIsSaving] = useState(false);
            const [editMode, setEditMode] = useState(false);
            const [oldQuestionText, setOldQuestionText] = useState('');
            const [newQuestion, setNewQuestion] = useState({
                semester: '1', academicYear: '2569', level: LEVELS[0], subject: SUBJECTS[0], question: '', choices: ['', '', '', ''], correctAnswer: 0
            });

            // ดึงข้อมูลเมื่อเริ่มใช้งาน
            useEffect(() => {
                fetchQuestionsFromSheets();
            }, []);

            const fetchQuestionsFromSheets = async () => {
                setIsLoadingData(true);
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL);
                    const result = await response.json();
                    if (result.status === 'success') {
                        setQuestions(result.data);
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                } finally {
                    setIsLoadingData(false);
                }
            };

            const handleLogout = () => {
                if(window.confirm('ต้องการออกจากระบบใช่หรือไม่?')) {
                    setUserRole(null); 
                    setCurrentView('login');
                    setStudentInfo({ name: '', level: '', skr: '' });
                    setSaveStatus('idle');
                }
            };

            // --- ฟังก์ชันบันทึกและจัดการข้อมูลผ่าน API ---

            // 1. บันทึกผลการสอบ (Student)
            const sendResultToSheets = async (finalScore, totalQuestions) => {
                setSaveStatus('saving');
                const payload = {
                    type: 'result',
                    timestamp: new Date().toLocaleString('th-TH'),
                    name: studentInfo.name,
                    level: studentInfo.level,
                    skr: studentInfo.skr,
                    subject: quizQuestions[0]?.subject,
                    score: finalScore,
                    total: totalQuestions,
                    percentage: Math.round((finalScore / totalQuestions) * 100)
                };

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    const res = await response.json();
                    if (res.status === 'success') setSaveStatus('success');
                    else setSaveStatus('error');
                } catch (error) {
                    console.error("Save result error:", error);
                    setSaveStatus('error');
                }
            };

            // 2. ลบข้อสอบ (Teacher)
            const handleDelete = async (q) => {
                if (!window.confirm(`ยืนยันการลบข้อสอบ: "${q.question}" ใช่หรือไม่?`)) return;
                setIsSaving(true);
                try {
                    const res = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            type: 'delete_question', 
                            question: q.question, 
                            subject: q.subject, 
                            level: q.level 
                        })
                    });
                    const result = await res.json();
                    if (result.status === 'success') {
                        alert('ลบข้อมูลเรียบร้อยแล้ว');
                        fetchQuestionsFromSheets();
                    }
                } catch (e) { alert('เกิดข้อผิดพลาดในการลบ'); }
                finally { setIsSaving(false); }
            };

            // 3. เพิ่ม/แก้ไขข้อสอบ (Teacher)
            const handleFormSubmit = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                try {
                    const payload = {
                        type: editMode ? 'edit_question' : 'question',
                        oldQuestion: editMode ? oldQuestionText : null,
                        timestamp: new Date().toLocaleString('th-TH'),
                        ...newQuestion,
                        choice1: newQuestion.choices[0],
                        choice2: newQuestion.choices[1],
                        choice3: newQuestion.choices[2],
                        choice4: newQuestion.choices[3]
                    };
                    const res = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();
                    if(result.status === 'success') {
                        alert(editMode ? 'แก้ไขข้อสอบสำเร็จ' : 'เพิ่มข้อสอบใหม่สำเร็จ');
                        setEditMode(false);
                        fetchQuestionsFromSheets();
                        setCurrentView('manage');
                    }
                } catch (error) {
                    alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
                } finally {
                    setIsSaving(false);
                }
            };

            // --- Logic การทำข้อสอบ ---
            const handleAnswerSelect = (index) => {
                const isCorrect = index === quizQuestions[currentQuestionIndex].correctAnswer;
                const newScore = isCorrect ? score + 1 : score;
                if (isCorrect) setScore(newScore);
                
                setUserAnswers([...userAnswers, { selected: index, isCorrect }]);
                
                if (currentQuestionIndex + 1 < quizQuestions.length) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                } else {
                    setCurrentView('result');
                    sendResultToSheets(newScore, quizQuestions.length);
                }
            };

            const startQuiz = (subject) => {
                const filtered = questions.filter(q => q.subject === subject && q.level === studentInfo.level);
                if (filtered.length === 0) {
                    alert(`ขออภัย ไม่พบข้อสอบวิชา ${subject} สำหรับระดับ ${studentInfo.level}`);
                    return;
                }
                setQuizQuestions(filtered);
                setCurrentQuestionIndex(0); 
                setScore(0); 
                setUserAnswers([]); 
                setSaveStatus('idle');
                setCurrentView('quiz');
            };

            // --- ส่วน UI Renders ---

            // 1. หน้า Login
            if (currentView === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-50 to-blue-100">
                    <div className="max-w-4xl w-full grid md:grid-cols-2 gap-8">
                        {/* ฝั่งนักเรียน */}
                        <div className="bg-white rounded-3xl shadow-2xl p-10 text-center border-t-8 border-blue-600 transition hover:shadow-blue-300">
                            <div className="text-7xl mb-6">👨‍🎓</div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-2">สำหรับผู้เรียน</h2>
                            <p className="text-gray-500 mb-8">กรุณาล็อกอินเพื่อเข้าทำแบบทดสอบ</p>
                            <button onClick={() => { setUserRole('student'); setCurrentView('student-info'); }} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">เข้าสู่ระบบผู้เรียน</button>
                        </div>
                        {/* ฝั่งครู */}
                        <div className="bg-white rounded-3xl shadow-2xl p-10 text-center border-t-8 border-orange-500 transition hover:shadow-orange-300">
                            <div className="text-7xl mb-6">🔐</div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-2">สำหรับครู</h2>
                            <p className="text-gray-500 mb-6">จัดการคลังข้อสอบและดูผลคะแนน</p>
                            <form onSubmit={(e) => { e.preventDefault(); if(passwordInput === 'admin123'){ setUserRole('teacher'); setCurrentView('menu'); } else { alert('รหัสผ่านไม่ถูกต้อง'); } }} className="space-y-4">
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} placeholder="รหัสผ่านผู้ดูแล" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full border-2 border-gray-100 bg-gray-50 rounded-2xl py-4 px-6 text-center outline-none focus:border-orange-400" required />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-4 text-gray-400 text-xl">
                                        {showPassword ? '👁️' : '🙈'}
                                    </button>
                                </div>
                                <button type="submit" className="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg">เข้าสู่ระบบครู</button>
                            </form>
                        </div>
                    </div>
                </div>
            );

            // 2. หน้ากรอกข้อมูลผู้สอบ
            if (currentView === 'student-info') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-blue-50">
                    <form onSubmit={(e) => { e.preventDefault(); setCurrentView('select-subject'); }} className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 border-t-8 border-blue-600 space-y-6">
                        <div className="text-center">
                            <h2 className="text-2xl font-bold text-gray-800">ระบุข้อมูลผู้เข้าสอบ</h2>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-gray-600 mb-1">ชื่อ-นามสกุล</label>
                                <input type="text" placeholder="พิมพ์ชื่อและนามสกุล" value={studentInfo.name} onChange={(e)=>setStudentInfo({...studentInfo, name: e.target.value})} className="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-blue-500" required />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-600 mb-1">ระดับชั้น</label>
                                <select value={studentInfo.level} onChange={(e)=>setStudentInfo({...studentInfo, level: e.target.value})} className="w-full border-2 border-gray-100 p-4 rounded-2xl bg-white focus:border-blue-500" required>
                                    <option value="">-- เลือกระดับชั้น --</option>
                                    {LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-600 mb-1">สังกัด ศกร.</label>
                                <select value={studentInfo.skr} onChange={(e)=>setStudentInfo({...studentInfo, skr: e.target.value})} className="w-full border-2 border-gray-100 p-4 rounded-2xl bg-white focus:border-blue-500" required>
                                    <option value="">-- เลือก ศกร. --</option>
                                    {SKR_LOCATIONS.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                        </div>
                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">ถัดไป: เลือกรายวิชา</button>
                        <button type="button" onClick={() => setCurrentView('login')} className="w-full text-gray-400 text-sm font-medium">ย้อนกลับ</button>
                    </form>
                </div>
            );

            // 3. หน้าเลือกรายวิชา
            if (currentView === 'select-subject') return (
                <div className="min-h-screen p-8 bg-gray-50">
                    <div className="max-w-6xl mx-auto">
                        <div className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-800">วิชาที่เปิดให้ทดสอบ</h1>
                                <p className="text-blue-600 font-bold">ระดับที่ท่านเลือก: {studentInfo.level}</p>
                            </div>
                            <button onClick={handleLogout} className="bg-white px-6 py-2 rounded-xl border text-red-500 font-bold hover:bg-red-50">ออกจากระบบ</button>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            {SUBJECTS.map((s, i) => {
                                const count = questions.filter(q => q.subject === s && q.level === studentInfo.level).length;
                                return (
                                    <button key={i} onClick={() => startQuiz(s)} disabled={count === 0} className={`p-8 rounded-3xl border-2 text-left h-full transition-all group ${count > 0 ? 'bg-white border-blue-100 hover:border-blue-500 hover:shadow-xl' : 'bg-gray-100 opacity-50 cursor-not-allowed'}`}>
                                        <h3 className="font-bold text-xl text-gray-800 mb-2 leading-tight">{s}</h3>
                                        <div className="text-xs font-bold text-blue-500">{count > 0 ? `พบข้อสอบ ${count} ข้อ` : 'ไม่มีข้อสอบในระดับนี้'}</div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );

            // 4. หน้าทำข้อสอบ
            if (currentView === 'quiz') {
                const q = quizQuestions[currentQuestionIndex];
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-indigo-50">
                        <div className="max-w-3xl w-full bg-white rounded-[2.5rem] shadow-2xl p-10 md:p-16 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gray-100">
                                <div className="bg-blue-600 h-full transition-all duration-500" style={{width: `${((currentQuestionIndex)/quizQuestions.length)*100}%`}}></div>
                            </div>
                            <div className="flex justify-between mb-8 text-sm font-bold text-gray-400 tracking-widest uppercase">
                                <span>{q.subject}</span>
                                <span>ข้อที่ {currentQuestionIndex + 1} / {quizQuestions.length}</span>
                            </div>
                            <h2 className="text-2xl md:text-3xl font-bold text-gray-800 mb-12 leading-relaxed">{q.question}</h2>
                            <div className="grid gap-4">
                                {q.choices.map((c, i) => (
                                    <button key={i} onClick={() => handleAnswerSelect(i)} className="quiz-option w-full text-left p-6 rounded-2xl border-2 border-gray-50 bg-gray-50 transition-all font-bold text-lg text-gray-700 flex items-center group">
                                        <span className="w-10 h-10 rounded-full bg-white border-2 border-gray-200 text-center leading-9 mr-4 text-sm text-gray-400 group-hover:border-blue-500 group-hover:text-blue-500">{['ก','ข','ค','ง'][i]}</span>
                                        {c}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // 5. หน้าสรุปคะแนน
            if (currentView === 'result') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-blue-700 to-indigo-900">
                    <div className="max-w-xl w-full bg-white rounded-[3rem] shadow-2xl p-12 text-center relative overflow-hidden">
                        <h2 className="text-4xl font-black text-gray-800 mb-8 tracking-widest uppercase">สรุปผลสอบ</h2>
                        <div className="bg-blue-50 p-8 rounded-[2rem] mb-10 border-2 border-blue-100">
                            <p className="text-2xl font-bold text-blue-900">{studentInfo.name}</p>
                            <p className="text-blue-600 font-bold text-sm">{studentInfo.level} | {studentInfo.skr}</p>
                            <div className="h-px bg-blue-200 my-4"></div>
                            <p className="text-lg font-bold text-gray-800 underline underline-offset-8 decoration-4 decoration-blue-500">{quizQuestions[0]?.subject}</p>
                        </div>
                        <div className="w-48 h-48 mx-auto rounded-full border-[15px] border-blue-600 flex flex-col items-center justify-center mb-10 bg-white shadow-inner">
                            <span className="text-6xl font-black text-blue-600">{score}</span>
                            <span className="text-gray-400 font-bold">/ {quizQuestions.length} คะแนน</span>
                        </div>
                        
                        {/* ส่วนแจ้งเตือนการบันทึกลงชีต */}
                        <div className="mb-8">
                            {saveStatus === 'saving' && <div className="text-orange-500 font-bold animate-pulse">⏳ กำลังส่งผลสอบไปที่ฐานข้อมูล...</div>}
                            {saveStatus === 'success' && <div className="text-green-600 font-bold">✅ บันทึกคะแนนลง Google Sheets เรียบร้อย!</div>}
                            {saveStatus === 'error' && <div className="text-red-500 font-bold">❌ บันทึกคะแนนไม่สำเร็จ กรุณาแจ้งคุณครู</div>}
                        </div>

                        <button onClick={()=>setCurrentView('select-subject')} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-black text-xl shadow-xl transition-all active:scale-95 mb-4">ทำวิชาอื่นต่อ</button>
                        <button onClick={handleLogout} className="text-gray-400 font-bold hover:text-red-500 transition-colors">ออกจากระบบ</button>
                    </div>
                </div>
            );

            // --- ส่วนของคุณครู ---
            
            // 6. เมนูครู
            if (currentView === 'menu') return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50 p-4">
                    <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-10 text-center border-t-8 border-orange-500 space-y-4">
                        <h1 className="text-2xl font-bold mb-6 text-gray-700 uppercase tracking-wide">จัดการระบบ (ครู)</h1>
                        <button onClick={() => { setEditMode(false); setCurrentView('add'); }} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-md transition-all">+ เพิ่มข้อสอบใหม่</button>
                        <button onClick={() => setCurrentView('manage')} className="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-md transition-all">📋 จัดการคลังข้อสอบ ({questions.length})</button>
                        <button onClick={() => { setUserRole(null); setCurrentView('login'); }} className="w-full border-2 border-gray-100 py-4 rounded-2xl font-bold text-gray-400 hover:text-red-500 transition-all">ออกจากระบบ</button>
                    </div>
                </div>
            );

            // 7. จัดการคลังข้อสอบ (Edit/Delete)
            if (currentView === 'manage') {
                const filtered = questions.filter(q => 
                    (filterSubject === 'ทั้งหมด' || q.subject === filterSubject) && 
                    (filterLevel === 'ทั้งหมด' || q.level === filterLevel)
                );
                return (
                    <div className="min-h-screen p-8 bg-white">
                        <div className="max-w-5xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setCurrentView('menu')} className="text-orange-500 font-bold hover:underline">⬅️ กลับเมนู</button>
                                    <h2 className="text-2xl font-bold text-gray-700">คลังข้อสอบทั้งหมด</h2>
                                </div>
                                <button onClick={() => { setEditMode(false); setCurrentView('add'); }} className="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">+ เพิ่มข้อสอบ</button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 bg-slate-50 p-6 rounded-3xl">
                                <div className="flex flex-col">
                                    <label className="text-xs font-bold text-gray-400 mb-1 ml-1">กรองรายวิชา</label>
                                    <select value={filterSubject} onChange={(e)=>setFilterSubject(e.target.value)} className="p-4 rounded-2xl outline-none shadow-sm border-none bg-white">
                                        <option value="ทั้งหมด">แสดงทุกวิชา</option>
                                        {SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div className="flex flex-col">
                                    <label className="text-xs font-bold text-gray-400 mb-1 ml-1">กรองระดับชั้น</label>
                                    <select value={filterLevel} onChange={(e)=>setFilterLevel(e.target.value)} className="p-4 rounded-2xl outline-none shadow-sm border-none bg-white">
                                        <option value="ทั้งหมด">แสดงทุกระดับ</option>
                                        {LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="space-y-6">
                                {filtered.length === 0 ? (
                                    <div className="text-center py-20 text-gray-400 font-bold">ไม่พบข้อมูลที่ค้นหา</div>
                                ) : (
                                    filtered.map((q, i) => (
                                        <div key={i} className="border-2 border-gray-100 p-8 rounded-[2.5rem] hover:border-blue-200 transition-all bg-white relative group">
                                            <div className="flex gap-2 mb-4">
                                                <span className="bg-blue-100 text-blue-600 text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-wider">{q.level}</span>
                                                <span className="bg-orange-100 text-orange-600 text-[10px] px-3 py-1 rounded-full font-bold tracking-wider">{q.subject}</span>
                                            </div>
                                            <p className="font-bold text-gray-800 text-xl mb-6">{q.question}</p>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-2 mb-8 text-gray-500">
                                                {q.choices.map((c, ci) => (
                                                    <div key={ci} className={`flex items-center gap-2 ${q.correctAnswer === ci ? 'text-emerald-600 font-bold' : ''}`}>
                                                        <span>{['ก.','ข.','ค.','ง.'][ci]}</span> {c}
                                                        {q.correctAnswer === ci && <span className="text-[10px] bg-emerald-50 px-1 rounded">เฉลย</span>}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex justify-end gap-3 pt-4 border-t border-gray-50">
                                                <button onClick={() => { 
                                                    setEditMode(true); 
                                                    setOldQuestionText(q.question);
                                                    setNewQuestion({
                                                        semester: q.semester || '1',
                                                        academicYear: q.academicYear || '2569',
                                                        level: q.level,
                                                        subject: q.subject,
                                                        question: q.question,
                                                        choices: [...q.choices],
                                                        correctAnswer: q.correctAnswer
                                                    });
                                                    setCurrentView('add');
                                                }} className="bg-blue-50 hover:bg-blue-600 text-blue-600 hover:text-white px-6 py-2 rounded-xl text-sm font-bold transition-all">✏️ แก้ไข</button>
                                                <button onClick={() => handleDelete(q)} className="bg-red-50 hover:bg-red-600 text-red-600 hover:text-white px-6 py-2 rounded-xl text-sm font-bold transition-all">🗑️ ลบ</button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // 8. หน้าฟอร์ม (Add / Edit)
            if (currentView === 'add') return (
                <div className="min-h-screen p-8 bg-slate-50 flex justify-center items-center">
                    <form onSubmit={handleFormSubmit} className="max-w-3xl w-full bg-white rounded-[3rem] p-10 md:p-14 shadow-2xl space-y-6">
                        <h2 className="text-3xl font-black text-center mb-6 text-orange-500">{editMode ? '🔄 แก้ไขข้อสอบ' : '➕ สร้างข้อสอบใหม่'}</h2>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="text-xs font-bold text-gray-400 ml-1">ระดับการศึกษา</label>
                                <select value={newQuestion.level} onChange={(e)=>setNewQuestion({...newQuestion, level: e.target.value})} className="w-full border-2 border-gray-50 p-4 rounded-2xl bg-gray-50 font-bold outline-none focus:border-orange-500">
                                    {LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-400 ml-1">วิชา</label>
                                <select value={newQuestion.subject} onChange={(e)=>setNewQuestion({...newQuestion, subject: e.target.value})} className="w-full border-2 border-gray-50 p-4 rounded-2xl bg-gray-50 font-bold outline-none focus:border-orange-500">
                                    {SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                        </div>
                        <div>
                            <label className="text-xs font-bold text-gray-400 ml-1">โจทย์คำถาม</label>
                            <textarea placeholder="ระบุคำถามที่นี่..." value={newQuestion.question} onChange={(e)=>setNewQuestion({...newQuestion, question: e.target.value})} className="w-full border-2 border-gray-50 p-6 rounded-2xl h-36 bg-gray-50 outline-none focus:border-orange-500 font-bold" required />
                        </div>
                        <div className="space-y-4">
                            <label className="text-xs font-bold text-gray-400 ml-1 uppercase tracking-widest">ตัวเลือกคำตอบ (เลือกข้อที่ถูก)</label>
                            {newQuestion.choices.map((c, i) => (
                                <div key={i} className="flex gap-4 items-center group">
                                    <input type="radio" name="correctAns" checked={newQuestion.correctAnswer === i} onChange={()=>setNewQuestion({...newQuestion, correctAnswer: i})} className="w-6 h-6 accent-orange-500 cursor-pointer" />
                                    <input type="text" placeholder={`ตัวเลือกข้อที่ ${i+1}`} value={c} onChange={(e)=>{
                                        let nc = [...newQuestion.choices];
                                        nc[i] = e.target.value;
                                        setNewQuestion({...newQuestion, choices: nc});
                                    }} className="flex-1 border-2 border-gray-50 p-4 rounded-2xl bg-gray-50 outline-none focus:border-orange-400 transition-all" required />
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-4 pt-8">
                            <button type="button" onClick={()=>{ setEditMode(false); setCurrentView('manage'); }} className="flex-1 bg-gray-100 hover:bg-gray-200 py-5 rounded-2xl font-black text-gray-400 transition-all">ยกเลิก</button>
                            <button type="submit" disabled={isSaving} className="flex-[2] bg-orange-500 hover:bg-orange-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95">
                                {isSaving ? '⏳ กำลังบันทึก...' : (editMode ? '💾 บันทึกการแก้ไข' : '💾 บันทึกลงฐานข้อมูล')}
                            </button>
                        </div>
                    </form>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
